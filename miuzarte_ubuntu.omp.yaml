.diamond_defaults: &diamond_defaults
  style: diamond
  leading_diamond: "оӮ¶" # "\ue0b6"
  trailing_diamond: "оӮҙ " # "\ue0b4"
  foreground: p:winWhite

# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 4

blocks:
  - type: prompt
    alignment: left
    leading_diamond: "оӮІ" # "\ue0b2"
    trailing_diamond: "оӮ°" # "\ue0b0"
    segments:
      - type: os
        style: diamond
        foreground: p:winWhite
        background: p:ubuntuOrange
        template: " {{.Icon}} "
      - type: path
        style: powerline
        foreground: p:winGray
        background: p:winWhite
        powerline_symbol: "оӮ°"
        template: " {{.Path}} "
        options:
          style: full

      - type: git
        style: diamond
        foreground: p:winWhite
        background: p:gitOrange
        leading_diamond: " оӮІ"
        trailing_diamond: "оӮ°"
        template: " {{.UpstreamIcon}} {{.HEAD}}{{if .BranchStatus}} {{.BranchStatus}}{{end}}{{if .Working.Changed}} оӮұ пҒ„ {{.Working.String}}{{end}}{{if and (.Working.Changed) (.Staging.Changed)}} |{{end}}{{if .Staging.Changed}} оӮұ пҒҶ {{.Staging.String}}{{end}}{{if gt .StashCount 0}} оӮұ оӯӢ {{.StashCount}}{{end}} "
      # template: " {{.UpstreamIcon}} {{.HEAD}}{{if .BranchStatus}} {{.BranchStatus}}{{end}}{{if .Working.Changed}} пҒ„ {{  .Working.String}}{{end}}{{if and (.Working.Changed) (.Staging.Changed)}} |{{end}}{{if .Staging.Changed}} пҒҶ {{  .Staging.String}}{{end}}{{if gt .StashCount 0}} пғҮ {{  .StashCount}}{{end}} "
      # template: "                   {{.HEAD}}{{if .BranchStatus}} {{.BranchStatus}}{{end}}{{if .Working.Changed}} пҒ„ {{  .Working.String}}{{end}}{{if and (.Staging.Changed) (.Working.Changed)}} |{{end}}{{if .Staging.Changed}} пҒҶ {{  .Staging.String}}{{end}} "
        background_templates:
          - "{{if or (.Working.Changed) (.Staging.Changed)}}#A97400{{end}}"
          - "{{if and (gt .Ahead 0) (gt .Behind 0)}}#54433A{{end}}"
          - "{{if gt .Ahead 0}}#744D89{{end}}"
          - "{{if gt .Behind 0}}#744D89{{end}}"
        options:
          fetch_status: true
          fetch_push_status: true
          fetch_upstream_icon: true
          fetch_bare_info: true
          fetch_user: true
          disable_with_jj: false
          native_fallback: false
          mapped_branches:
            feat/*: "рҹҡҖ "
            bug/*: "рҹҗӣ "

      - type: project
        style: diamond
        foreground: "#193549"
        background: "#FFEB3B"
        leading_diamond: " оӮІ"
        trailing_diamond: "оӮ°"
        template: " {{ if .Error }}{{ .Error }}{{ else }}{{ if .Version }}\uf487 {{.Version}}{{ end }} {{ if .Name }}{{ .Name }}{{ end }}{{ end }} "

  - type: prompt
    alignment: right
    overflow: hide
    segments:
      - type: go
        <<: *diamond_defaults
        background: p:goGopherBlue
        # оҳҰ \ue626
        # оҳ§ \ue627
        template: "{{if not .Full}} {{end}}оҳ§ {{if .Error}}{{.Error}}{{else}}{{.Full}}{{end}}"
      - type: kotlin
        <<: *diamond_defaults
        background: p:kotlinPurple
        # оҳҙ \ue634
        # о ӣ \ue81b
        # уұҲҷ \udb84\ude19
        template: "{{if not .Full}} {{end}}оҳҙ {{ .Full }}"
      - type: java
        <<: *diamond_defaults
        background: p:javaBlue
        # оү– \ue256
        # оҷӯ \ue66d
        # оңё \ue738
        # о¶Ҝ \uedaf
        # у°¬· \udb82\udf37
        template: "{{if not .Full}} {{end}}оү– {{ .Full }}"
      - type: dart
        <<: *diamond_defaults
        background: p:dartBahamaBlue
        # оҷҢ \ue64c
        # оһҳ \ue798
        template: "{{if not .Full}} {{end}}оһҳ {{ .Full }}"
      - type: zig
        <<: *diamond_defaults
        background: p:zigYellow
        # оҡ© \ue6a9
        # оЈҜ \ue8ef
        template: "{{if not .Full}} {{end}}оҡ© {{ .Full }}"
      - type: rust
        <<: *diamond_defaults
        background: p:rustOrange
        # оҡӢ \ue68b
        # оһЁ \ue7a8
        # уұҳ— \udb85\ude17
        template: "{{if not .Full}} {{end}}оҡӢ {{ .Full }}"
      - type: python
        <<: *diamond_defaults
        foreground: p:pythonKournikova
        background: p:pythonPhiladelphia
        # оҲө \ue235
        # оҳҶ \ue606
        # оңј \ue73c
        # оҙӣ \ued1b
        # у°Ң  \udb80\udf20
        template: "оҲө {{if .Error}}{{.Error}}{{else}}{{if .Venv}}{{.Venv}} {{end}}{{.Full}}{{end}}"
      - type: node
        <<: *diamond_defaults
        foreground: p:nodeBrightCobaltGreen
        background: p:nodePearlBlack
        # оңҳ \ue718
        # оңҷ \ue719
        # оЎ„ \ue844
        # оЎ… \ue845
        # оҙҚ \ued0d
        # оө„ \ued44
        # у°Һҷ \udb80\udf99
        template: "{{if not .Full}} {{end}}оңҳ {{if .PackageManagerIcon}}{{.PackageManagerIcon}} {{end}}{{.Full}}"
        options:
          fetch_package_manager: true
      - type: lua
        <<: *diamond_defaults
        background: p:luaBlue
        # оҳ  \ue620
        # о Ұ \ue826
        # у°ўұ \udb82\udcb1
        template: "{{if not .Full}} {{end}}оҳ  {{ .Full }}"
      - type: php
        <<: *diamond_defaults
        background: p:phpAda
        # оңҪ \ue73d
        # оөӯ \ued6d
        # оҳҲ \ue608
        # у°Ңҹ \udb80\udf1f
        template: "оөӯ {{ .Full }}"

      - type: status
        style: accordion
        foreground: p:winWhite
        background: p:ubuntuOrange
        # еҸіеҜ№йҪҗзҡ„ powerline з»„, йғҪиҰҒ invert
        invert_powerline: true
        powerline_symbol: "оӮІ"
        # у°ҲҶ \udb80\ude06
        template: " у°ҲҶ {{.String}} "
      - type: executiontime
        style: accordion
        foreground: p:winGray
        background: p:winWhite
        invert_powerline: true
        powerline_symbol: "оӮІ"
        # о®ў \ueba2
        template: " о®ў {{.FormattedMs}} "
        options:
          threshold: 10
      - type: time
        style: diamond
        foreground: p:winWhite
        background: p:ubuntuOrange
        invert_powerline: true
        trailing_diamond: "оӮ°"
        # пҖ— \uf017
        # пҒі \uf073
        # пҗә \uf43a
        # оҷҒ \ue641
        # у°Ҙ” \udb82\udd54
        template: " {{.CurrentDate | date .Format}} "
        options:
          time_format: "15:04:05 1/2"

  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: text
        style: plain
        foreground: p:ubuntuOrange
        template: "{{if .Root}}#{{else}}${{end}} "

  - type: rprompt
    alignment: right
    filler: ""
    segments:
      - type: session
        style: plain
        foreground: accent
        template: "{{if .SSHSession}}о®© {{end}}{{.UserName}}@{{.HostName}}{{if .WSL}} in WSL{{end}}"

secondary_prompt:
  template: "| "
  foreground: p:ubuntuOrange

accent_color: "#FFFFFF"

